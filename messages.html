<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - GrowthLock</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="messages.css">
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="header-content">
            <h1 class="header-title">💬 Messages</h1>
            <p class="header-subtitle">Live chat with admin</p>
            <div id="user-header" class="user-header"></div>
        </div>
        <div class="header-nav" id="header-nav">
            <a href="index.html" class="nav-link">← Dashboard</a>
            <button class="logout-small-btn" onclick="handleLogout()">Logout</button>
        </div>
    </header>

    <!-- Main container -->
    <main class="app-container">
        <!-- Messages Container -->
        <section class="glass-card messages-card">
            <div class="messages-list" id="messagesList">
                <!-- Messages populated here -->
            </div>
        </section>

        <!-- Message Input -->
        <section class="glass-card message-input-section">
            <div class="message-input-group">
                <textarea id="messageInput" placeholder="Type your message..." class="message-textarea"></textarea>
                <button class="submit-btn" onclick="sendMessage()">Send 📤</button>
            </div>
            <p style="font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 10px;">Messages sync in real-time</p>
        </section>
    </main>

    <script src="auth.js"></script>
    <script src="script.js"></script>
    <script src="messages.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</body>
</html>
