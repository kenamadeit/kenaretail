name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
      - publish-live
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare deploy folder
        run: |
          mkdir -p dist
          find . -maxdepth 1 -type f \(
            -name "*.html" -o
            -name "*.css" -o
            -name "*.js" -o
            -name "*.webmanifest" -o
            -name "*.png" -o
            -name "*.jpg" -o
            -name "*.jpeg" -o
            -name "*.gif" -o
            -name "*.webp" -o
            -name "*.svg" -o
            -name "*.ico"
          \) -exec cp {} dist/ \;

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
