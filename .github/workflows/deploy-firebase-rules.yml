name: Deploy Firebase Database Rules

on:
  push:
    branches:
      - main
    paths:
      - firebase-database.rules.json
      - firebase.json
      - .github/workflows/deploy-firebase-rules.yml
  workflow_dispatch:

jobs:
  deploy-rules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Firebase secret input
        id: validate-secret
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "has_secret=false" >> "$GITHUB_OUTPUT"
            echo "valid_json=false" >> "$GITHUB_OUTPUT"
            echo "FIREBASE_SERVICE_ACCOUNT_JSON is not configured."
            exit 0
          fi

          SECRET_CONTENT='${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}'
          if node -e "JSON.parse(process.argv[1])" "$SECRET_CONTENT" >/dev/null 2>&1; then
            echo "has_secret=true" >> "$GITHUB_OUTPUT"
            echo "valid_json=true" >> "$GITHUB_OUTPUT"
            echo "Firebase secret is present and valid JSON."
          else
            echo "has_secret=true" >> "$GITHUB_OUTPUT"
            echo "valid_json=false" >> "$GITHUB_OUTPUT"
            echo "FIREBASE_SERVICE_ACCOUNT_JSON is present but not valid JSON."
          fi

      - name: Skip deploy when secret missing or invalid
        if: ${{ steps.validate-secret.outputs.has_secret != 'true' || steps.validate-secret.outputs.valid_json != 'true' }}
        run: |
          echo "Skipping Firebase rules deployment."
          echo "Set a valid FIREBASE_SERVICE_ACCOUNT_JSON in GitHub Actions secrets."

      - name: Authenticate to Google Cloud
        if: ${{ steps.validate-secret.outputs.has_secret == 'true' && steps.validate-secret.outputs.valid_json == 'true' }}
        id: gcp-auth
        continue-on-error: true
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Skip deploy when auth fails
        if: ${{ steps.gcp-auth.outcome == 'failure' }}
        run: |
          echo "Google Cloud authentication failed."
          echo "Check service-account permissions and key content in FIREBASE_SERVICE_ACCOUNT_JSON."

      - name: Setup Node.js
        if: ${{ steps.gcp-auth.outcome == 'success' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        if: ${{ steps.gcp-auth.outcome == 'success' }}
        run: npm install -g firebase-tools

      - name: Deploy Realtime Database Rules
        if: ${{ steps.gcp-auth.outcome == 'success' }}
        continue-on-error: true
        id: deploy-rules
        run: firebase deploy --only database --project growthlock-6a9e3 --non-interactive

      - name: Report deploy status
        if: ${{ steps.gcp-auth.outcome == 'success' }}
        run: |
          if [ "${{ steps.deploy-rules.outcome }}" = "success" ]; then
            echo "Firebase database rules deployed successfully."
          else
            echo "Firebase deployment failed. Check Firebase service account roles and project access."
          fi