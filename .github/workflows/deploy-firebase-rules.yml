name: Deploy Firebase Database Rules

on:
  push:
    branches:
      - main
    paths:
      - firebase-database.rules.json
      - firebase.json
      - .github/workflows/deploy-firebase-rules.yml
  workflow_dispatch:

jobs:
  deploy-rules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Realtime Database Rules
        run: firebase deploy --only database --project growthlock-6a9e3 --non-interactive