<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - GrowthLock</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body>
    <div class="container">
        <div class="auth-header">
            <h1>✨ GrowthLock</h1>
            <p class="auth-subtitle">Sign in with Google</p>
        </div>

        <div class="auth-form social-auth-card">
            <p class="social-auth-note">No password needed. Use your Google account to continue.</p>

            <div class="form-group checkbox consent-checkbox">
                <input type="checkbox" id="registerConsent" name="registerConsent" required>
                <label for="registerConsent">
                    I agree to the <a href="terms.html" target="_blank" rel="noopener noreferrer">Terms &amp; Conditions</a> and <a href="privacy.html" target="_blank" rel="noopener noreferrer">Privacy Policy</a>
                </label>
            </div>
            <span class="error-message" id="consent-error"></span>

            <div class="auth-divider"><span>Continue with</span></div>

            <button type="button" class="google-auth-btn" id="googleAuthBtn">
                <span class="google-badge">G</span>
                Continue with Google
            </button>

            <div class="success-message" id="successMessage">
                ✓ Login successful! Redirecting...
            </div>

            <div class="error-alert" id="errorAlert"></div>
        </div>

        <div class="auth-footer">
            <p>Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
