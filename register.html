<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - GrowthLock</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="container">
        <!-- Logo/Header -->
        <div class="auth-header">
            <h1>✨ GrowthLock</h1>
            <p class="auth-subtitle">Create Your Account</p>
        </div>

        <!-- Register Form -->
        <form class="auth-form" id="registerForm">
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input 
                    type="text" 
                    id="fullname" 
                    name="fullname" 
                    placeholder="Enter your full name"
                    required
                >
                <span class="error-message" id="fullname-error"></span>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="Enter your email"
                    required
                >
                <span class="error-message" id="email-error"></span>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Create a strong password"
                    required
                >
                <span class="password-requirements">
                    ✓ At least 8 characters
                    ✓ Include uppercase and numbers
                </span>
                <span class="error-message" id="password-error"></span>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    name="confirmPassword" 
                    placeholder="Confirm your password"
                    required
                >
                <span class="error-message" id="confirmPassword-error"></span>
            </div>

            <div class="form-group">
                <label for="profilePic">Profile Picture (Optional)</label>
                <input 
                    type="file" 
                    id="profilePic" 
                    name="profilePic" 
                    accept="image/*"
                >
                <small>Upload a profile picture (JPG, PNG, GIF - max 5MB)</small>
                <div id="picPreview" style="margin-top: 10px; text-align: center; display: none;">
                    <img id="picPreviewImg" style="max-width: 100px; border-radius: 50%;">
                </div>
                <span class="error-message" id="profilePic-error"></span>
            </div>

            <div class="form-group checkbox">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree to the Terms & Conditions</label>
                <span class="error-message" id="terms-error"></span>
            </div>

            <button type="submit" class="submit-btn">Create Account</button>

            <!-- Success Message -->
            <div class="success-message" id="successMessage">
                ✓ Account created successfully! Redirecting to login...
            </div>

            <!-- Error Message -->
            <div class="error-alert" id="errorAlert"></div>
        </form>

        <!-- Login Link -->
        <div class="auth-footer">
            <p>Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
