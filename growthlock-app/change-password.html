<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - GrowthLock</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        .change-password-container {
            max-width: 400px;
            margin: 60px auto;
            background: rgba(255,255,255,0.10);
            border-radius: 18px;
            box-shadow: 0 8px 40px rgba(0,212,255,0.18);
            padding: 32px 24px;
            backdrop-filter: blur(18px);
        }
        .change-password-container h2 {
            text-align: center;
            margin-bottom: 24px;
        }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; }
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #b3eaff;
            background: rgba(255,255,255,0.18);
            color: #222;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg,#00d4ff,#1a7fa0);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        #changePasswordMsg {
            margin-top: 12px;
            text-align: center;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="change-password-container">
        <h2>🔑 Change Password</h2>
        <form id="changePasswordForm" autocomplete="off">
            <div class="form-group">
                <label for="currentPassword">Current Password</label>
                <input type="password" id="currentPassword" name="currentPassword" required autocomplete="current-password">
            </div>
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" name="newPassword" required autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password">
            </div>
            <button type="submit" class="submit-btn">Update Password</button>
            <div id="changePasswordMsg"></div>
        </form>
        <div style="text-align:center;margin-top:18px;">
            <a href="profile.html" style="color:#00d4ff;text-decoration:underline;">← Back to Profile</a>
        </div>
    </div>
    <script>
    document.getElementById('changePasswordForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const current = document.getElementById('currentPassword').value;
        const newPass = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;
        const msg = document.getElementById('changePasswordMsg');
        msg.style.color = '#ff6464';
        msg.textContent = '';
        if (newPass.length < 6) {
            msg.textContent = 'New password must be at least 6 characters.';
            return;
        }
        if (newPass !== confirm) {
            msg.textContent = 'New passwords do not match.';
            return;
        }
        let users = JSON.parse(localStorage.getItem('growthlock_users') || '{}');
        let currentUser = JSON.parse(localStorage.getItem('growthlock_currentUser') || 'null');
        if (!currentUser || !users[currentUser.email]) {
            msg.textContent = 'User not found or not logged in.';
            return;
        }
        if (users[currentUser.email].password !== current) {
            msg.textContent = 'Current password is incorrect.';
            return;
        }
        users[currentUser.email].password = newPass;
        localStorage.setItem('growthlock_users', JSON.stringify(users));
        msg.style.color = '#00d4ff';
        msg.textContent = 'Password updated successfully!';
        document.getElementById('changePasswordForm').reset();
    });
    </script>
</body>
</html>
