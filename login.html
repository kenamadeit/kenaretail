<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GrowthLock</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4285f4">

        <style>
            .google-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                background: linear-gradient(135deg, rgba(255,255,255,0.35) 0%, rgba(66,133,244,0.18) 100%);
                color: #222;
                border: 1.5px solid rgba(255,255,255,0.35);
                border-radius: 18px;
                font-size: 17px;
                font-weight: 500;
                padding: 14px 28px;
                cursor: pointer;
                box-shadow: 0 8px 32px 0 rgba(66,133,244,0.18), 0 1.5px 6px 0 rgba(0,0,0,0.08);
                backdrop-filter: blur(16px) saturate(180%);
                -webkit-backdrop-filter: blur(16px) saturate(180%);
                transition: box-shadow 0.2s, border-color 0.2s, background 0.2s;
                outline: none;
                border-bottom: 2.5px solid rgba(66,133,244,0.18);
                position: relative;
                overflow: hidden;
            }
            .google-btn::before {
                content: "";
                position: absolute;
                top: 0; left: 0; right: 0; bottom: 0;
                background: linear-gradient(120deg, rgba(255,255,255,0.45) 0%, rgba(66,133,244,0.12) 100%);
                opacity: 0.7;
                pointer-events: none;
                border-radius: 18px;
            }
            .google-btn:hover {
                box-shadow: 0 12px 36px 0 rgba(66,133,244,0.28), 0 2px 8px 0 rgba(0,0,0,0.12);
                border-color: #4285f4;
                background: linear-gradient(135deg, rgba(255,255,255,0.45) 0%, rgba(66,133,244,0.28) 100%);
            }
            .google-icon {
                width: 26px;
                height: 26px;
                margin-right: 12px;
                filter: drop-shadow(0 1px 2px rgba(66,133,244,0.18));
            }
        </style>

        <!-- Firebase SDKs -->
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
        <script>
            // Your Firebase config here
            const firebaseConfig = {
                apiKey: "YOUR_API_KEY",
                authDomain: "YOUR_AUTH_DOMAIN",
                projectId: "YOUR_PROJECT_ID",
                storageBucket: "YOUR_STORAGE_BUCKET",
                messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
                appId: "YOUR_APP_ID"
            };
            firebase.initializeApp(firebaseConfig);
        </script>
</head>
<body>
    <div class="container">
        <!-- Logo/Header -->
        <div class="auth-header">
            <h1>✨ GrowthLock</h1>
            <p class="auth-subtitle">Welcome Back</p>
        </div>

        <!-- Login Form -->
        <form class="auth-form" id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email Address</label>
                <input 
                    type="email" 
                    id="loginEmail" 
                    name="email" 
                    placeholder="Enter your email"
                    required
                >
                <span class="error-message" id="email-error"></span>
            </div>

            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input 
                    type="password" 
                    id="loginPassword" 
                    name="password" 
                    placeholder="Enter your password"
                    required
                >
                <span class="error-message" id="password-error"></span>
            </div>

            <div class="form-group checkbox">
                <input type="checkbox" id="rememberMe" name="rememberMe">
                <label for="rememberMe">Remember me</label>
            </div>

            <button type="submit" class="submit-btn">Login</button>

                <!-- Google Sign-In Button -->
                <div style="text-align:center; margin: 20px 0;">
                                <button type="button" id="googleSignInBtn" class="google-btn">
                                    <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                                        <g>
                                            <path fill="#4285F4" d="M24 9.5c3.54 0 6.36 1.22 8.32 3.22l6.18-6.18C34.44 2.74 29.64 0 24 0 14.82 0 6.72 5.48 2.74 13.44l7.6 5.91C12.36 13.36 17.74 9.5 24 9.5z"/>
                                            <path fill="#34A853" d="M46.09 24.5c0-1.54-.14-3.02-.41-4.45H24v8.43h12.44c-.54 2.9-2.18 5.36-4.64 7.01l7.19 5.59C43.98 37.36 46.09 31.36 46.09 24.5z"/>
                                            <path fill="#FBBC05" d="M10.34 28.35c-1.13-3.36-1.13-6.97 0-10.33l-7.6-5.91C.64 16.36 0 20.09 0 24c0 3.91.64 7.64 2.74 11.09l7.6-5.91z"/>
                                            <path fill="#EA4335" d="M24 46c5.64 0 10.44-1.87 13.63-5.09l-7.19-5.59c-2.01 1.35-4.59 2.13-7.44 2.13-6.26 0-11.64-3.86-13.66-9.44l-7.6 5.91C6.72 42.52 14.82 48 24 48z"/>
                                            <path fill="none" d="M0 0h48v48H0z"/>
                                        </g>
                                    </svg>
                                    Sign in with Google
                                </button>
                </div>

            <!-- Success Message -->
            <div class="success-message" id="successMessage">
                ✓ Login successful! Redirecting...
            </div>

            <!-- Error Message -->
            <div class="error-alert" id="errorAlert"></div>

            <!-- Forgot Password Link -->
            <a href="forgot-password.html" class="forgot-password">🔑 Forgot password?</a>
        </form>

        <!-- Register Link -->
        <div class="auth-footer">
            <p>Don't have an account? <a href="register.html">Register here</a></p>
        </div>
    </div>

    <script src="auth.js"></script>

        <script>
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', function() {
                    navigator.serviceWorker.register('service-worker.js')
                        .then(function(registration) {
                            console.log('ServiceWorker registration successful:', registration);
                        })
                        .catch(function(error) {
                            console.log('ServiceWorker registration failed:', error);
                        });
                });
            }
        </script>

        <script>
            document.addEventListener('DOMContentLoaded', function() {
                var googleBtn = document.getElementById('googleSignInBtn');
                if (googleBtn) {
                    googleBtn.addEventListener('click', function() {
                        if (typeof firebase === 'undefined' || !firebase.auth) {
                            document.getElementById('errorAlert').textContent = 'Firebase not initialized.';
                            return;
                        }
                        const provider = new firebase.auth.GoogleAuthProvider();
                        firebase.auth().signInWithPopup(provider)
                            .then((result) => {
                                window.location.href = 'dashboard.html';
                            })
                            .catch((error) => {
                                document.getElementById('errorAlert').textContent = error.message;
                            });
                    });
                }
            });
        </script>
</body>
</html>
