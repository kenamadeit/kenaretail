<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GrowthLock</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
    <meta name="theme-color" content="#4285f4">

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        (function () {
            const protocol = window.location.protocol;
            const pwaSupported = protocol === 'http:' || protocol === 'https:' || protocol === 'chrome-extension:';
            if (!pwaSupported) return;

            const manifestLink = document.createElement('link');
            manifestLink.rel = 'manifest';
            manifestLink.href = 'manifest.json';
            document.head.appendChild(manifestLink);
        })();
    </script>
</head>
<body>
    <div class="container">
        <div class="auth-header">
            <h1>✨ GrowthLock</h1>
            <p class="auth-subtitle">Sign in with Google</p>
        </div>

        <div class="auth-form social-auth-card">
            <p class="social-auth-note">Your account is created automatically on first Google sign in.</p>

            <div class="auth-divider"><span>Continue with</span></div>

            <button type="button" class="google-auth-btn" id="googleAuthBtn">
                <span class="google-badge">G</span>
                Continue with Google
            </button>

            <div class="success-message" id="successMessage">
                ✓ Login successful! Redirecting...
            </div>

            <div class="error-alert" id="errorAlert"></div>
        </div>

        <div class="auth-footer">
            <p>New here? <a href="register.html">Register here</a></p>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        const protocol = window.location.protocol;
        const swSupported = protocol === 'http:' || protocol === 'https:' || protocol === 'chrome-extension:';

        if ('serviceWorker' in navigator && swSupported) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('service-worker.js')
                    .then(function(registration) {
                        console.log('ServiceWorker registration successful:', registration);
                    })
                    .catch(function(error) {
                        console.log('ServiceWorker registration failed:', error);
                    });
            });
        } else if ('serviceWorker' in navigator) {
            console.log('ServiceWorker skipped: unsupported protocol for current page origin.');
        }
    </script>
</body>
</html>
