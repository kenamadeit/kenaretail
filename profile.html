<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - GrowthLock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="header-content">
            <h1 class="header-title">👤 Your Profile</h1>
            <p class="header-subtitle">Manage account & reminders</p>
            <div id="user-header" class="user-header"></div>
        </div>
        <div class="header-nav" id="header-nav">
            <a href="index.html" class="nav-link">← Dashboard</a>
            <button class="logout-small-btn" onclick="handleLogout()">Logout</button>
        </div>
    </header>

    <!-- Main container -->
    <main class="app-container">
        <!-- Profile Picture Section -->
        <section class="glass-card">
            <h2 class="card-title">📷 Profile Picture</h2>
            <div style="text-align: center;">
                <div id="profilePicDisplay" style="margin: 20px 0;">
                    <img id="profilePicImg" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(0,212,255,0.3);">
                </div>
                <input type="file" id="profilePicInput" accept="image/*" style="display: none;">
                <button class="primary-btn" onclick="document.getElementById('profilePicInput').click()">Change Picture</button>
                <p style="font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 10px;">JPG, PNG, GIF (max 5MB)</p>
            </div>
        </section>

        <!-- Summary card -->
        <section class="glass-card">
            <h2 class="card-title">Account Details</h2>
            <p><strong>Name:</strong> <span id="profileName"></span></p>
            <p><strong>Email:</strong> <span id="profileEmail"></span></p>
        </section>

        <!-- Stats card -->
        <section class="glass-card">
            <h2 class="card-title">📊 Your Stats</h2>
            <div class="stats-mini">
                <div class="stat-mini-item">
                    <div class="stat-mini-number" id="statStreak">0</div>
                    <div class="stat-mini-label">Current Streak</div>
                </div>
                <div class="stat-mini-item">
                    <div class="stat-mini-number" id="statWeekly">0%</div>
                    <div class="stat-mini-label">Weekly Consistency</div>
                </div>
                <div class="stat-mini-item">
                    <div class="stat-mini-number" id="statTotal">0</div>
                    <div class="stat-mini-label">Days Tracked</div>
                </div>
            </div>
        </section>

        <!-- Notification settings card -->
        <section class="glass-card">
            <h2 class="card-title">🔔 Reminder Times</h2>
            <p>Select two times each day for reminders:</p>
            <input type="time" id="notifyTime1">
            <input type="time" id="notifyTime2" style="margin-left: 10px;">
            <button class="submit-btn" id="saveNotifBtn" style="margin-top: 15px;">Save</button>
        </section>
    </main>

    <script src="auth.js"></script>
    <script src="script.js"></script>
    <script src="profile.js"></script>
</body>
</html>
